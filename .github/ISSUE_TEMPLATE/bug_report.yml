name: Bug report
description: Report a reproducible problem in the current toolbox behavior
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve `dev-ai-toolkit`.
        Please provide enough detail for someone else to reproduce the problem.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is going wrong?
      placeholder: A short description of the bug.
    validations:
      required: true
  - type: textarea
    id: current_behavior
    attributes:
      label: Current behavior
      description: What happens today?
      placeholder: Describe the current behavior.
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
      placeholder: Describe the expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide a clear step-by-step reproduction path.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include browser, OS, and app mode if relevant.
      placeholder: macOS 15 / Chrome 136 / local dev server
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Screenshots, logs, or extra notes if available.
